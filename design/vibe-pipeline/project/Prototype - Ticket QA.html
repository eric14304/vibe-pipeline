<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>vibe-pipeline — Ticket Q&A prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="proto/tokens.css" />
<link rel="stylesheet" href="proto/qa.css" />
<style>
  .screen-stage { width: 100%; height: 100vh; }
  .proto-jumpback {
    position: fixed; left: 18px; bottom: 18px;
    padding: 6px 12px;
    background: var(--panel);
    color: var(--fg-mute);
    border: 1px solid var(--line-2);
    border-radius: 999px;
    font-size: 12px;
    box-shadow: var(--shadow-md);
    z-index: 50;
    text-decoration: none;
  }
  .proto-jumpback:hover { color: var(--fg); border-color: var(--accent); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="proto/qa.jsx"></script>

<script type="text/babel">
const { useEffect: useEQa } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "autoplay": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEQa(() => {
    document.documentElement.classList.toggle("light", !t.dark);
  }, [t.dark]);

  return (
    <>
      <div className="screen-stage">
        <QAScreen variant="drawer" autoplay={t.autoplay} />
      </div>

      <a className="proto-jumpback" href="Prototype Overview.html">← Overview</a>

      <TweaksPanel title="Tweaks">
        <TweakSection label="主題">
          <TweakToggle label="深色模式" value={t.dark} onChange={(v) => setTweak("dark", v)} />
        </TweakSection>
        <TweakSection label="動畫">
          <TweakToggle label="自動播放" value={t.autoplay} onChange={(v) => setTweak("autoplay", v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
