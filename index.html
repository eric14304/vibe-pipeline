<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>vibe-pipeline</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#d4956d" />
    <!-- 初始 body bg 對齊 theme,避免 React mount 前 white flash -->
    <style>
      html { background: #f7f4ee; }
      html:not(.light) { background: #1c1916; }
      body { margin: 0; }
      #vp-mount-loader {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
        font-family: 'Noto Sans TC', sans-serif;
      }
      #vp-mount-loader img { opacity: 0.7; }
      #vp-mount-loader .vp-mount-msg {
        font-size: 12px; color: #888; letter-spacing: 0.05em;
      }
    </style>
    <script>
      // Set theme class synchronously before any CSS or React loads (no first-paint flash).
      // Priority: URL ?theme=  →  localStorage  →  default light
      // (URL 留 pixel-diff / 分享連結 override;真正記住偏好走 localStorage)
      (function () {
        var p = new URLSearchParams(location.search);
        var urlTheme = p.get("theme");
        var stored = null;
        try { stored = localStorage.getItem("vibe-pipeline:theme"); } catch (e) {}
        var dark = (urlTheme || stored) === "dark";
        if (!dark) document.documentElement.classList.add("light");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <!-- React mount 前 placeholder:避免 PWA reload 白屏一閃。React mount 後整段被取代 -->
      <div id="vp-mount-loader">
        <img src="/icon.svg" width="48" height="48" alt="" />
        <div class="vp-mount-msg">載入中…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
