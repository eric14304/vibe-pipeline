<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>vibe-pipeline</title>
    <link rel="manifest" href="/manifest.json" />
    <script>
      // Set theme class synchronously before any CSS or React loads (no first-paint flash).
      // Priority: URL ?theme=  →  localStorage  →  default light
      // (URL 留 pixel-diff / 分享連結 override;真正記住偏好走 localStorage)
      (function () {
        var p = new URLSearchParams(location.search);
        var urlTheme = p.get("theme");
        var stored = null;
        try { stored = localStorage.getItem("vibe-pipeline:theme"); } catch (e) {}
        var dark = (urlTheme || stored) === "dark";
        if (!dark) document.documentElement.classList.add("light");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
